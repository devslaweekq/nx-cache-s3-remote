name: Docker Publish

# Required repo secrets:
#   DOCKER_USERNAME — Docker Hub login (e.g. slaweekq)
#   DOCKER_PASSWORD — Docker Hub Personal Access Token with "Read, Write, Delete" scope
#                     (not account password)
#
# Registry cache: slaweekq/nx-cache-s3:buildcache

on:
  push:
    branches: [main, master]
    paths:
      - Dockerfile
      - package.json
      - package-lock.json
      - tsconfig.json
      - ecosystem.config.cjs
      - src/**
      - README.md
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build
        run: bash ./scripts/docker/build.sh

      - name: Push
        run: bash ./scripts/docker/push.sh

      - name: Sync Docker Hub overview from README.md
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: ${{ secrets.DOCKER_USERNAME }}/nx-cache-s3
          readme-filepath: ./README.md
          short-description: Self-hosted Nx remote cache server backed by S3-compatible storage
