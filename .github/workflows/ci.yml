name: CI

on:
  push:
    branches: [main, master]
    paths:
      - Dockerfile
      - package.json
      - package-lock.json
      - tsconfig.json
      - ecosystem.config.cjs
      - src/**
      - README.md
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
